spring.application.name=coordinator
# Kafka bootstrap server
spring.kafka.bootstrap-servers=localhost:9092

# --- Producer Config ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Add type info headers so multiple DTOs can be deserialized correctly
#spring.kafka.producer.properties.spring.json.add.type.headers=true

# --- Consumer Config ---
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Trust all packages (so your DTOs can be deserialized)
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Group ID for your service
spring.kafka.consumer.group-id=coordinator-service-group

server.port=8081

# ===================================================================
# Jaeger & Distributed Tracing (Micrometer + OTLP)
# ===================================================================
# 1. Enable Kafka Observation (Essential for Header Injection)
spring.kafka.producer.observation-enabled=true
spring.kafka.consumer.observation-enabled=true

# 2. OpenTelemetry Exporter (Jaeger OTLP Port)
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# 3. Sampling (1.0 = 100% of requests for development)
management.tracing.sampling.probability=1.0

# 4. Observation propagation
management.observations.key-values.enabled=true

# ===================================================================
# Actuator & Metrics (Prometheus)
# ===================================================================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
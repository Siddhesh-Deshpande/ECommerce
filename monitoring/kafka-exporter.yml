apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: ecomm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:latest
          args:
            - "--kafka.server=kafka-service.ecomm.svc.cluster.local:9092"
          ports:
            - containerPort: 9308
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter-service
  namespace: ecomm
spec:
  selector:
    app: kafka-exporter
  ports:
    - port: 9308
      targetPort: 9308

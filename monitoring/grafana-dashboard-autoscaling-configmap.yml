apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-autoscaling
  namespace: ecomm
data:
  autoscaling.json: |
    {
      "editable": true,
      "panels": [
        {
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 15,
                "gradientMode": "none",
                "lineInterpolation": "stepAfter",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": {
                  "group": "A",
                  "mode": "none"
                }
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 16,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "calcs": [
                "lastNotNull",
                "max"
              ],
              "displayMode": "table",
              "placement": "bottom",
              "showLegend": true
            },
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            }
          },
          "targets": [
            {
              "datasource": "Prometheus",
              "expr": "kube_deployment_status_replicas_available{namespace=\"ecomm\"}",
              "legendFormat": "{{deployment}} - Running Pods",
              "refId": "A"
            }
          ],
          "title": "Service Pod Count (Scaling Over Time)",
          "type": "timeseries"
        }
      ],
      "refresh": "5s",
      "schemaVersion": 38,
      "style": "dark",
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "title": "Scaling & Pods Timeline Dashboard",
      "uid": "scaling-timeline",
      "version": 1
    }

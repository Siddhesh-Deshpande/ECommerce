apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ecomm
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: 'coordinator'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['coordinator-service.ecomm.svc.cluster.local:80']
            labels:
              application: 'coordinator'

      - job_name: 'order-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['order-service.ecomm.svc.cluster.local:80']
            labels:
              application: 'order-service'

      - job_name: 'payment-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['payment-service.ecomm.svc.cluster.local:80']
            labels:
              application: 'payment-service'

      - job_name: 'inventory-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['inventory-service.ecomm.svc.cluster.local:80']
            labels:
              application: 'inventory-service'

      - job_name: 'kafka-exporter'
        static_configs:
          - targets: ['kafka-exporter-service.ecomm.svc.cluster.local:9308']
            labels:
              application: 'kafka'

      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.kube-system.svc.cluster.local:8080']

      - job_name: 'cadvisor'
        static_configs:
          - targets: ['cadvisor-service.kube-system.svc.cluster.local:8080']
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ecomm
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: 'coordinator'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['coordinator-service.ecomm.svc.cluster.local:80']
            labels:
              application: 'coordinator'

      - job_name: 'order-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['order-service.ecomm.svc.cluster.local:80']
            labels:
              application: 'order-service'

      - job_name: 'payment-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['payment-service.ecomm.svc.cluster.local:80']
            labels:
              application: 'payment-service'

      - job_name: 'inventory-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: ['inventory-service.ecomm.svc.cluster.local:80']
            labels:
              application: 'inventory-service'